<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atlanta Music France</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Inter", sans-serif;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .brand {
      font-family: "Playfair Display", serif;
      font-size: 70px;
      letter-spacing: 6px;
      font-weight: 600;
    }

    .sub {
      margin-top: 15px;
      font-size: 13px;
      letter-spacing: 4px;
      color: #aaa;
      text-transform: uppercase;
    }

    nav {
      margin-top: 30px;
    }

    nav a {
      margin: 0 12px;
      text-decoration: none;
      color: #fff;
      font-size: 12px;
      letter-spacing: 3px;
      opacity: 0.6;
      transition: 0.3s;
    }

    nav a:hover {
      opacity: 1;
    }

    section {
      padding: 120px 20px;
      max-width: 900px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-family: "Playfair Display", serif;
      font-weight: 400;
      letter-spacing: 5px;
      font-size: 22px;
      margin-bottom: 60px;
    }

    .artist {
      border-top: 1px solid #222;
      padding: 40px 0;
    }

    .artist h3 {
      font-weight: 400;
      letter-spacing: 3px;
    }

    .artist p {
      color: #777;
      font-size: 14px;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 50px;
      font-size: 11px;
      color: #555;
      letter-spacing: 3px;
    }
  </style>
</head>

<body>

<header>
  <div class="brand">ATLANTA MUSIC</div>
  <div class="sub">France — Record Label</div>

  <nav>
    <a href="#">ARTISTS</a>
    <a href="#">RELEASES</a>
    <a href="#">CONTACT</a>
  </nav>
</header>

<section>
  <h2>ARTISTS</h2>

  <div class="artist">
    <h3>ARTIST ONE</h3>
    <p>Melodic / Trap / Emotional soundscape</p>
  </div>

  <div class="artist">
    <h3>ARTIST TWO</h3>
    <p>Underground aesthetic / dark minimal vibe</p>
  </div>
</section>

<footer>
  ATLANTA MUSIC FRANCE © 2026 — ALL RIGHTS RESERVED
</footer>

</body>
</html>
