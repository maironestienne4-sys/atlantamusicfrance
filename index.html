<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atlanta Music France</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .brand {
      font-size: 60px;
      letter-spacing: 6px;
      font-weight: 300;
    }

    .sub {
      margin-top: 15px;
      font-size: 14px;
      letter-spacing: 3px;
      color: #999;
      text-transform: uppercase;
    }

    nav {
      margin-top: 30px;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #fff;
      font-size: 13px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    nav a:hover {
      opacity: 1;
    }

    section {
      padding: 120px 20px;
      max-width: 900px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-weight: 300;
      letter-spacing: 4px;
      font-size: 20px;
      margin-bottom: 40px;
    }

    .artist {
      border-top: 1px solid #222;
      padding: 30px 0;
    }

    .artist h3 {
      font-weight: 300;
      letter-spacing: 2px;
    }

    .artist p {
      color: #777;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 40px;
      font-size: 12px;
      color: #555;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

<header>
  <div class="brand">ATLANTA MUSIC</div>
  <div class="sub">France — Record Label</div>

  <nav>
    <a href="#">ARTISTS</a>
    <a href="#">MUSIC</a>
    <a href="#">CONTACT</a>
  </nav>
</header>

<section>
  <h2>ARTISTS</h2>

  <div class="artist">
    <h3>ARTIST ONE</h3>
    <p>Contemporary sound — emotional & street influence</p>
  </div>

  <div class="artist">
    <h3>ARTIST TWO</h3>
    <p>Underground wave — minimal & dark aesthetic</p>
  </div>
</section>

<footer>
  ATLANTA MUSIC FRANCE © 2026 — ALL RIGHTS RESERVED
</footer>

</body>
</html>
